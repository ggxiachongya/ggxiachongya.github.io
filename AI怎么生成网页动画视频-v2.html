<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>AI 怎么生成网页动画视频</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' fill='%23050608'/%3E%3Cpath d='M18 10h28l-5 44H13z' fill='%23ef3426'/%3E%3C/svg%3E">
<style>
  :root {
    --black: #050608;
    --panel: #0b0d10;
    --bone: #f1eadc;
    --muted: rgba(241,234,220,0.68);
    --line: rgba(241,234,220,0.18);
    --red: #ef3426;
    --dark-red: #6d120f;
    --yellow: #f7c85a;
    --blue: #83b9ff;
    --green: #8edb93;
  }

  * { box-sizing: border-box; }

  html,
  body {
    margin: 0;
    min-height: 100%;
    background: #000;
    color: var(--bone);
    font-family: Inter, "Arial Black", "Microsoft YaHei", "PingFang SC", system-ui, sans-serif;
    overflow: hidden;
  }

  body {
    display: grid;
    place-items: center;
  }

  .app {
    position: fixed;
    inset: 0;
    display: grid;
    place-items: center;
    background: #000;
  }

  .stage-shell {
    position: relative;
    width: min(100vw, calc((100vh - 74px) * 16 / 9));
    max-width: 100vw;
    max-height: 100vh;
    display: grid;
    grid-template-rows: auto auto;
    gap: 12px;
    background: #000;
    overflow: visible;
  }

  .stage {
    position: relative;
    width: 100%;
    aspect-ratio: 16 / 9;
    overflow: hidden;
    background: var(--black);
    isolation: isolate;
  }

  #fx {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    z-index: 1;
  }

  .grain,
  .scan,
  .flash,
  .vignette {
    position: absolute;
    inset: 0;
    pointer-events: none;
  }

  .grain {
    z-index: 7;
    opacity: 0.16;
    background-image:
      radial-gradient(circle at 20% 30%, rgba(255,255,255,0.12) 0 1px, transparent 1px),
      radial-gradient(circle at 70% 60%, rgba(255,255,255,0.08) 0 1px, transparent 1px);
    background-size: 17px 19px, 29px 31px;
    mix-blend-mode: screen;
  }

  .scan {
    z-index: 8;
    opacity: 0.24;
    background: repeating-linear-gradient(0deg, rgba(255,255,255,0.04), rgba(255,255,255,0.04) 1px, transparent 1px, transparent 5px);
  }

  .vignette {
    z-index: 9;
    background:
      radial-gradient(circle at 50% 52%, transparent 0 48%, rgba(0,0,0,0.52) 100%),
      linear-gradient(90deg, rgba(0,0,0,0.42), transparent 24%, transparent 76%, rgba(0,0,0,0.38));
  }

  .flash {
    z-index: 30;
    opacity: 0;
    background:
      radial-gradient(circle at 50% 50%, rgba(239,52,38,0.34), transparent 48%),
      rgba(239,52,38,0.12);
    transition: opacity 260ms ease-out;
  }

  .flash.hot {
    opacity: 0.3;
  }

  .shot-hud {
    position: absolute;
    top: 28px;
    left: 34px;
    right: 34px;
    z-index: 12;
    display: flex;
    justify-content: space-between;
    align-items: center;
    color: rgba(241,234,220,0.72);
    font-size: clamp(12px, 1.15vw, 18px);
    font-weight: 950;
    letter-spacing: 0.12em;
    text-transform: uppercase;
  }

  .shot-hud b {
    color: var(--red);
  }

  .shot-content {
    position: absolute;
    inset: 0;
    z-index: 11;
    display: grid;
    place-items: center;
    padding: clamp(40px, 6vw, 88px);
    text-align: center;
  }

  .shot-card {
    width: min(1180px, 92%);
    display: grid;
    gap: clamp(14px, 2.2vw, 30px);
    justify-items: center;
    animation: hitIn 560ms cubic-bezier(.12,.82,.18,1) both;
  }

  @keyframes hitIn {
    0% { opacity: 0; transform: translateY(18px) scale(0.985); filter: blur(5px); }
    55% { opacity: 1; transform: translateY(-3px) scale(1.004); filter: blur(0); }
    100% { opacity: 1; transform: translateY(0) scale(1); filter: blur(0); }
  }

  .kicker {
    color: var(--red);
    font-size: clamp(13px, 1.3vw, 18px);
    font-weight: 1000;
    letter-spacing: 0.28em;
  }

  .headline {
    margin: 0;
    max-width: 1160px;
    color: var(--bone);
    font-size: clamp(56px, 9.4vw, 152px);
    line-height: 0.9;
    font-weight: 1000;
    letter-spacing: 0;
    text-shadow: 0 24px 72px rgba(0,0,0,0.7);
  }

  .headline .red { color: var(--red); }
  .headline .small { font-size: 0.54em; display: block; margin-top: 0.14em; color: rgba(241,234,220,0.82); }

  .caption {
    position: absolute;
    left: 50%;
    bottom: 82px;
    z-index: 15;
    width: min(1160px, calc(100% - 80px));
    transform: translateX(-50%);
    color: rgba(241,234,220,0.82);
    font-size: clamp(21px, 2.5vw, 38px);
    line-height: 1.32;
    font-weight: 950;
    text-align: center;
    text-shadow: 0 14px 38px rgba(0,0,0,0.86);
  }

  .caption .mark { color: var(--red); }

  .scene-lines {
    display: grid;
    gap: 12px;
    width: min(940px, 92%);
  }

  .line-row {
    display: grid;
    grid-template-columns: 140px 1fr;
    gap: 14px;
    align-items: center;
    padding: 15px 18px;
    border: 1px solid var(--line);
    background: rgba(8,10,13,0.78);
    border-radius: 5px;
    text-align: left;
    font-size: clamp(18px, 2vw, 32px);
    font-weight: 950;
  }

  .line-row span:first-child {
    color: var(--red);
    font-family: Consolas, Menlo, monospace;
    font-size: 0.9em;
  }

  .keyword-cloud {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    gap: clamp(10px, 1.4vw, 22px);
    max-width: 980px;
  }

  .keyword-cloud span {
    display: inline-flex;
    align-items: center;
    min-height: 54px;
    padding: 0.24em 0.48em;
    border: 1px solid rgba(241,234,220,0.22);
    background: rgba(239,52,38,0.12);
    color: var(--bone);
    font-size: clamp(28px, 4vw, 70px);
    font-weight: 1000;
    transform: rotate(var(--r, 0deg));
    box-shadow: 0 16px 50px rgba(0,0,0,0.32);
  }

  .layers {
    display: grid;
    gap: 20px;
    width: min(920px, 88%);
    transform: perspective(900px) rotateX(54deg) rotateZ(-8deg);
  }

  .layer {
    min-height: 104px;
    display: grid;
    place-items: center;
    border: 2px solid var(--line);
    background: rgba(241,234,220,0.08);
    color: var(--bone);
    font-size: clamp(32px, 5vw, 82px);
    font-weight: 1000;
    box-shadow: 0 28px 70px rgba(0,0,0,0.42);
  }

  .split {
    width: min(1140px, 94%);
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 22px;
    align-items: stretch;
  }

  .pane {
    min-height: 360px;
    border: 1px solid var(--line);
    background: rgba(7,8,10,0.82);
    border-radius: 6px;
    overflow: hidden;
    text-align: left;
  }

  .pane-title {
    padding: 14px 18px;
    border-bottom: 1px solid var(--line);
    color: var(--muted);
    font-size: 14px;
    font-weight: 950;
    letter-spacing: 0.12em;
  }

  .code {
    padding: 22px;
    color: #dfefff;
    font: 700 clamp(15px, 1.35vw, 22px)/1.55 Consolas, Menlo, monospace;
    white-space: pre-wrap;
  }

  .stage-mini {
    height: calc(100% - 48px);
    display: grid;
    place-items: center;
    color: var(--bone);
    font-size: clamp(34px, 4.3vw, 78px);
    line-height: 0.95;
    font-weight: 1000;
    text-align: center;
    background:
      radial-gradient(circle at 65% 44%, rgba(239,52,38,0.25), transparent 40%),
      repeating-linear-gradient(0deg, rgba(255,255,255,0.035), rgba(255,255,255,0.035) 1px, transparent 1px, transparent 7px);
  }

  .rec-frame {
    position: relative;
    width: min(1050px, 88%);
    aspect-ratio: 16 / 8.2;
    border: 4px solid rgba(241,234,220,0.8);
    display: grid;
    place-items: center;
    box-shadow: 0 0 0 999px rgba(0,0,0,0.2);
  }

  .rec-dot {
    position: absolute;
    top: 22px;
    left: 24px;
    display: flex;
    align-items: center;
    gap: 12px;
    color: var(--red);
    font-size: clamp(18px, 2vw, 32px);
    font-weight: 1000;
    letter-spacing: 0.12em;
  }

  .rec-dot::before {
    content: "";
    width: 20px;
    height: 20px;
    border-radius: 50%;
    background: var(--red);
    box-shadow: 0 0 28px var(--red);
    animation: blink 820ms steps(2,end) infinite;
  }

  @keyframes blink { 50% { opacity: 0.25; } }

  .timeline-map {
    position: absolute;
    left: 42px;
    right: 42px;
    bottom: 28px;
    z-index: 14;
    display: grid;
    gap: 10px;
  }

  .cue-track {
    position: relative;
    height: 8px;
    border-radius: 99px;
    background: rgba(241,234,220,0.15);
    overflow: visible;
    cursor: pointer;
    touch-action: none;
  }

  .cue-track::before {
    content: "";
    position: absolute;
    inset: -14px 0;
  }

  .cue-fill {
    height: 100%;
    width: 0%;
    border-radius: 99px;
    background: linear-gradient(90deg, var(--red), var(--yellow));
    box-shadow: 0 0 24px rgba(239,52,38,0.55);
  }

  .cue-nodes {
    position: absolute;
    inset: -6px 0;
  }

  .cue-node {
    position: absolute;
    top: 50%;
    width: 14px;
    height: 14px;
    border-radius: 50%;
    transform: translate(-50%, -50%);
    border: 2px solid rgba(241,234,220,0.6);
    background: #090a0c;
  }

  .cue-node.active {
    border-color: var(--red);
    background: var(--red);
    box-shadow: 0 0 22px var(--red);
  }

  .cue-handle {
    position: absolute;
    top: 50%;
    left: 0%;
    width: 18px;
    height: 18px;
    border-radius: 50%;
    transform: translate(-50%, -50%);
    background: var(--bone);
    border: 3px solid var(--red);
    box-shadow: 0 0 26px rgba(239,52,38,0.72);
    z-index: 2;
    pointer-events: none;
  }

  .cue-meta {
    display: flex;
    justify-content: space-between;
    color: rgba(241,234,220,0.58);
    font: 800 12px/1 Consolas, Menlo, monospace;
  }

  .controls {
    position: relative;
    justify-self: end;
    margin-right: 42px;
    z-index: 50;
    width: auto;
    transform: translateY(0);
    display: grid;
    grid-template-columns: auto auto auto;
    gap: 8px;
    align-items: center;
    padding: 8px;
    border: 1px solid rgba(241,234,220,0.2);
    border-radius: 6px;
    background: rgba(5,6,8,0.66);
    backdrop-filter: blur(12px);
    opacity: 1;
    transition: opacity 220ms ease, transform 220ms ease;
  }

  .controls-hidden .controls {
    opacity: 0;
    transform: translateY(12px);
    pointer-events: none;
  }

  .ctrl-btn {
    height: 38px;
    min-width: 78px;
    border: 1px solid rgba(241,234,220,0.24);
    background: rgba(241,234,220,0.08);
    color: var(--bone);
    border-radius: 4px;
    font-weight: 1000;
    letter-spacing: 0.06em;
    cursor: pointer;
  }

  .ctrl-btn.primary {
    background: var(--red);
    border-color: var(--red);
  }

  .timecode {
    min-width: 98px;
    color: var(--muted);
    text-align: right;
    font: 900 14px/1 Consolas, Menlo, monospace;
  }

  .start-overlay {
    position: absolute;
    inset: 0;
    z-index: 80;
    display: grid;
    place-items: center;
    background: #000;
  }

  .start-button {
    width: clamp(118px, 14vw, 188px);
    aspect-ratio: 1;
    border-radius: 50%;
    border: 2px solid rgba(241,234,220,0.9);
    background: transparent;
    color: var(--bone);
    font-size: clamp(22px, 2.4vw, 34px);
    font-weight: 1000;
    letter-spacing: 0.08em;
    cursor: pointer;
  }

  .start-button:hover {
    border-color: var(--red);
    color: #fff;
    box-shadow: 0 0 42px rgba(239,52,38,0.42);
  }

  .prestart .stage > *:not(.start-overlay) { display: none; }
  .prestart .controls { display: none; }
  .started .start-overlay { display: none; }

  @media (max-width: 760px) {
    .stage-shell {
      width: 100vw;
      height: 100vh;
      aspect-ratio: auto;
      grid-template-rows: minmax(0, 1fr) auto;
      gap: 0;
    }

    .stage {
      height: 100%;
      aspect-ratio: auto;
    }

    .shot-hud {
      top: 18px;
      left: 18px;
      right: 18px;
    }

    .shot-content {
      padding: 52px 22px 140px;
    }

    .headline {
      font-size: clamp(42px, 13vw, 78px);
    }

    .caption {
      bottom: 118px;
      width: calc(100% - 40px);
      font-size: clamp(17px, 5vw, 25px);
    }

    .timeline-map {
      left: 22px;
      right: 22px;
      bottom: 24px;
    }

    .controls {
      justify-self: end;
      margin-right: 14px;
      margin-bottom: 12px;
      grid-template-columns: auto auto auto;
    }

    .timecode {
      min-width: 84px;
      text-align: right;
    }

    .line-row {
      grid-template-columns: 92px 1fr;
      font-size: 17px;
      padding: 12px;
    }

    .split {
      grid-template-columns: 1fr;
      gap: 12px;
    }

    .pane {
      min-height: 210px;
    }

    .layers {
      transform: perspective(900px) rotateX(44deg) rotateZ(-7deg);
      gap: 12px;
    }

    .layer {
      min-height: 72px;
    }
  }
</style>
</head>
<body>
<main class="app prestart" id="app">
  <div class="stage-shell">
    <section class="stage" id="stage" aria-label="AI 怎么生成网页动画视频">
      <canvas id="fx"></canvas>
      <div class="grain"></div>
      <div class="scan"></div>
      <div class="vignette"></div>
      <div class="flash" id="flash"></div>
      <div class="shot-hud">
        <div><b id="shotNo">01</b> / 16</div>
        <div id="shotName">误解开场</div>
        <div id="clock">00:00</div>
      </div>
      <div class="shot-content" id="shotContent"></div>
      <div class="caption" id="caption"></div>
      <div class="timeline-map">
        <div class="cue-track" id="cueTrack" role="slider" tabindex="0" aria-label="timeline" aria-valuemin="0" aria-valuemax="60" aria-valuenow="0">
          <div class="cue-fill" id="cueFill"></div>
          <div class="cue-nodes" id="cueNodes"></div>
          <div class="cue-handle" id="cueHandle"></div>
        </div>
        <div class="cue-meta"><span>00:00</span><span>01:00</span></div>
      </div>
      <div class="start-overlay">
        <button class="start-button" id="startBtn" type="button">PLAY</button>
      </div>
    </section>
    <div class="controls" id="controls">
      <button class="ctrl-btn primary" id="playBtn" type="button">PAUSE</button>
      <button class="ctrl-btn" id="restartBtn" type="button">REPLAY</button>
      <div class="timecode" id="timecode">00:00 / 01:00</div>
    </div>
  </div>
  <audio id="voice" preload="metadata"></audio>
</main>

<script>
(() => {
  const DURATION = 60;
  const cues = [
    {
      at: 0,
      name: "误解开场",
      caption: "你以为 AI 生成视频，是直接吐出一个 mp4 吗？",
      html: `<div class="shot-card"><div class="kicker">MISUNDERSTANDING</div><h1 class="headline">AI 生成视频？<span class="small">直接吐出 MP4？</span></h1></div>`
    },
    {
      at: 3,
      name: "网页方案出现",
      caption: "不一定。还有一种更灵活的方式：让 AI 生成一个网页。",
      html: `<div class="shot-card"><div class="kicker">NOT ONLY MP4</div><h1 class="headline">不是 <span class="red">mp4</span><span class="small">是一个网页</span></h1></div>`
    },
    {
      at: 7,
      name: "动画系统",
      caption: "这个网页不是普通网页，而是一个会自己播放的动画系统。",
      html: `<div class="shot-card"><div class="kicker">PLAYABLE WEB SYSTEM</div><h1 class="headline">会自己播放的<br><span class="red">动画系统</span></h1></div>`
    },
    {
      at: 11,
      name: "元素集合",
      caption: "它有舞台，有镜头，有文字，有粒子，有闪白，有转场。",
      html: `<div class="shot-card"><div class="kicker">MOTION ELEMENTS</div><div class="keyword-cloud"><span style="--r:-7deg">舞台</span><span style="--r:4deg">镜头</span><span style="--r:-2deg">文字</span><span style="--r:6deg">粒子</span><span style="--r:-5deg">闪白</span><span style="--r:3deg">转场</span></div></div>`
    },
    {
      at: 15,
      name: "时间线",
      caption: "更重要的是，它有一条时间线。",
      html: `<div class="shot-card"><div class="kicker">THE TIMELINE</div><h1 class="headline">一条<span class="red">时间线</span></h1></div>`
    },
    {
      at: 19,
      name: "旁白对齐",
      caption: "每一句旁白，对应一个时间点。",
      html: `<div class="shot-card"><div class="kicker">VOICE TO TIME</div><div class="scene-lines"><div class="line-row"><span>00:19</span><span>每一句旁白</span></div><div class="line-row"><span>00:23</span><span>对应一个时间点</span></div><div class="line-row"><span>00:27</span><span>触发一个镜头</span></div></div></div>`
    },
    {
      at: 23,
      name: "画面触发",
      caption: "时间到了，画面切换；情绪到了，动画爆发。",
      html: `<div class="shot-card"><div class="kicker">TRIGGER</div><h1 class="headline">时间到<br><span class="red">画面切</span></h1></div>`
    },
    {
      at: 27,
      name: "AI 拆分文稿",
      caption: "AI 先读文稿，把内容拆成一个个分镜。",
      html: `<div class="shot-card"><div class="kicker">SCRIPT TO SHOTS</div><h1 class="headline">文稿<br><span class="red">拆成分镜</span></h1></div>`
    },
    {
      at: 31,
      name: "关键词视觉化",
      caption: "再把关键词变成视觉：大字、数字、线条、人物、噪点、符号。",
      html: `<div class="shot-card"><div class="kicker">KEYWORDS BECOME VISUALS</div><div class="keyword-cloud"><span>大字</span><span>数字</span><span>线条</span><span>人物</span><span>噪点</span><span>符号</span></div></div>`
    },
    {
      at: 35,
      name: "技术层",
      caption: "然后用 HTML 搭结构，用 CSS 做视觉，用 Canvas 做动态背景。",
      html: `<div class="shot-card"><div class="kicker">WEB LAYERS</div><div class="layers"><div class="layer">HTML 结构</div><div class="layer">CSS 视觉</div><div class="layer">Canvas 动态</div></div></div>`
    },
    {
      at: 39,
      name: "音频驱动",
      caption: "如果有音频，就用 audio.currentTime 控制所有动画。",
      html: `<div class="shot-card"><div class="kicker">AUDIO DRIVEN</div><h1 class="headline">audio<br><span class="red">.currentTime</span></h1></div>`
    },
    {
      at: 43,
      name: "声画同步",
      caption: "不是靠猜，不是靠延迟，而是让画面跟着声音走。",
      html: `<div class="shot-card"><div class="kicker">SYNC</div><h1 class="headline">不是猜<br><span class="red">跟着声音走</span></h1></div>`
    },
    {
      at: 47,
      name: "拖动进度条",
      caption: "所以你拖动进度条，画面也会跳到对应的分镜。",
      html: `<div class="shot-card"><div class="kicker">SCRUB TO ANY SHOT</div><h1 class="headline">拖到哪里<br><span class="red">跳到哪里</span></h1></div>`
    },
    {
      at: 51,
      name: "可修改网页",
      caption: "最后，你得到的不是一个死视频，而是一个可修改、可录屏、可部署的网页动画。",
      html: `<div class="shot-card"><div class="kicker">EDITABLE WEB MOTION</div><div class="split"><div class="pane"><div class="pane-title">CODE</div><div class="code">cues[13].caption = "可修改";\nstyle.color = "#ef3426";\nrender(currentTime);</div></div><div class="pane"><div class="pane-title">STAGE</div><div class="stage-mini">可修改<br><span style="color:#ef3426">可录屏</span><br>可部署</div></div></div></div>`
    },
    {
      at: 55,
      name: "网页播放成视频",
      caption: "网页舞台外出现录屏框，红色 REC 点亮。",
      html: `<div class="shot-card"><div class="kicker">RECORD THE WEBPAGE</div><div class="rec-frame"><div class="rec-dot">REC</div><h1 class="headline">网页正在<br><span class="red">播放成视频</span></h1></div></div>`
    },
    {
      at: 58,
      name: "核心总结",
      caption: "这就是 AI 生成网页动画视频的核心：先生成网页，再把网页播放成视频。",
      html: `<div class="shot-card"><div class="kicker">CORE IDEA</div><h1 class="headline">先生成网页<br><span class="red">再播放成视频</span></h1></div>`
    }
  ];

  const app = document.getElementById("app");
  const stage = document.getElementById("stage");
  const canvas = document.getElementById("fx");
  const ctx = canvas.getContext("2d");
  const content = document.getElementById("shotContent");
  const caption = document.getElementById("caption");
  const shotNo = document.getElementById("shotNo");
  const shotName = document.getElementById("shotName");
  const clock = document.getElementById("clock");
  const timecode = document.getElementById("timecode");
  const cueTrack = document.getElementById("cueTrack");
  const cueFill = document.getElementById("cueFill");
  const cueNodes = document.getElementById("cueNodes");
  const cueHandle = document.getElementById("cueHandle");
  const flash = document.getElementById("flash");
  const startBtn = document.getElementById("startBtn");
  const playBtn = document.getElementById("playBtn");
  const restartBtn = document.getElementById("restartBtn");
  const audio = document.getElementById("voice");

  let started = false;
  let playing = false;
  let offset = 0;
  let startedAt = 0;
  let activeIndex = -1;
  let hideTimer = 0;
  let pointerX = 0.62;
  let pointerY = 0.44;

  cueNodes.innerHTML = cues.map((cue, i) => {
    const left = (cue.at / DURATION) * 100;
    return `<span class="cue-node" data-i="${i}" style="left:${left}%"></span>`;
  }).join("");
  const nodes = [...cueNodes.querySelectorAll(".cue-node")];

  function pad(n) {
    return String(Math.floor(n)).padStart(2, "0");
  }

  function fmt(t) {
    t = Math.max(0, Math.min(DURATION, t));
    return `${pad(t / 60)}:${pad(t % 60)}`;
  }

  function fit() {
    const rect = canvas.getBoundingClientRect();
    const dpr = Math.min(window.devicePixelRatio || 1, 2);
    canvas.width = Math.max(1, Math.floor(rect.width * dpr));
    canvas.height = Math.max(1, Math.floor(rect.height * dpr));
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    return rect;
  }

  function currentTime() {
    if (!started) return 0;
    if (audio.src && !audio.paused) return Math.min(DURATION, audio.currentTime);
    if (playing) return Math.min(DURATION, offset + (performance.now() - startedAt) / 1000);
    return Math.min(DURATION, offset);
  }

  function cueAt(t) {
    let index = 0;
    for (let i = 0; i < cues.length; i++) {
      if (t >= cues[i].at) index = i;
      else break;
    }
    return index;
  }

  function localProgress(t, index) {
    const start = cues[index].at;
    const end = cues[index + 1]?.at ?? DURATION;
    return Math.max(0, Math.min(1, (t - start) / Math.max(0.001, end - start)));
  }

  function renderCue(index) {
    if (index === activeIndex) return;
    activeIndex = index;
    const cue = cues[index];
    content.innerHTML = cue.html;
    caption.innerHTML = cue.caption.replace(/网页|时间线|audio\.currentTime|网页动画/g, `<span class="mark">$&</span>`);
    shotNo.textContent = String(index + 1).padStart(2, "0");
    shotName.textContent = cue.name;
    nodes.forEach((node, i) => node.classList.toggle("active", i === index));
    flash.classList.remove("hot");
    if (started) {
      requestAnimationFrame(() => {
        flash.classList.add("hot");
        setTimeout(() => flash.classList.remove("hot"), 170);
      });
    }
  }

  function setTime(t) {
    t = Math.max(0, Math.min(DURATION, t));
    offset = t;
    startedAt = performance.now();
    if (audio.src) audio.currentTime = t;
    render(t);
  }

  function showControls() {
    if (!started) return;
    app.classList.remove("controls-hidden");
    clearTimeout(hideTimer);
    if (playing) {
      hideTimer = setTimeout(() => app.classList.add("controls-hidden"), 1700);
    }
  }

  function play() {
    if (!started) {
      started = true;
      app.classList.remove("prestart");
      app.classList.add("started");
    }
    playing = true;
    startedAt = performance.now();
    playBtn.textContent = "PAUSE";
    showControls();
  }

  function pause() {
    offset = currentTime();
    playing = false;
    playBtn.textContent = "PLAY";
    app.classList.remove("controls-hidden");
  }

  function restart() {
    offset = 0;
    startedAt = performance.now();
    activeIndex = -1;
    if (!playing) play();
    setTime(0);
  }

  function drawBackground(w, h, t, index, p) {
    ctx.fillStyle = "#050608";
    ctx.fillRect(0, 0, w, h);

    const mx = w * (0.5 + (pointerX - 0.5) * 0.16);
    const my = h * (0.48 + (pointerY - 0.5) * 0.16);
    const pulse = 0.5 + Math.sin(t * 2.4) * 0.5;

    const grad = ctx.createRadialGradient(mx, my, 20, mx, my, Math.max(w, h) * (0.55 + pulse * 0.08));
    grad.addColorStop(0, `rgba(239,52,38,${0.18 + p * 0.08})`);
    grad.addColorStop(0.42, "rgba(70,12,12,0.26)");
    grad.addColorStop(1, "rgba(0,0,0,0)");
    ctx.fillStyle = grad;
    ctx.fillRect(0, 0, w, h);

    ctx.save();
    ctx.globalAlpha = 0.08;
    ctx.strokeStyle = index % 3 === 1 ? "#f7c85a" : "#ef3426";
    ctx.lineWidth = 1;
    const drift = (t * 42) % 80;
    for (let x = -w; x < w * 2; x += 80) {
      ctx.beginPath();
      ctx.moveTo(x + drift, 0);
      ctx.lineTo(x + drift + h * 0.45, h);
      ctx.stroke();
    }
    ctx.restore();

    ctx.save();
    for (let i = 0; i < 120; i++) {
      const a = i * 0.78 + t * (0.28 + index * 0.015);
      const r = 50 + (i % 27) * 16 + p * 90;
      const x = mx + Math.cos(a) * r * (1.2 + (index % 4) * 0.1);
      const y = my + Math.sin(a * 1.34) * r * 0.58;
      ctx.globalAlpha = 0.11 + (i % 5) * 0.025;
      ctx.fillStyle = i % 8 === 0 ? "#ef3426" : "#f1eadc";
      ctx.fillRect(x, y, 2 + (i % 3), 2 + (i % 3));
    }
    ctx.restore();
  }

  function drawFile(w, h, p) {
    const cx = w * 0.72;
    const cy = h * 0.42;
    const ww = w * 0.18;
    const hh = h * 0.28;
    ctx.save();
    ctx.translate(cx - ww / 2, cy - hh / 2);
    ctx.fillStyle = "rgba(241,234,220,0.08)";
    ctx.strokeStyle = "rgba(241,234,220,0.78)";
    ctx.lineWidth = 3;
    ctx.beginPath();
    ctx.moveTo(0, 0);
    ctx.lineTo(ww * 0.7, 0);
    ctx.lineTo(ww, hh * 0.25);
    ctx.lineTo(ww, hh);
    ctx.lineTo(0, hh);
    ctx.closePath();
    ctx.fill();
    ctx.stroke();
    ctx.strokeStyle = "#ef3426";
    ctx.lineWidth = 12;
    ctx.beginPath();
    ctx.moveTo(-20, hh + 18);
    ctx.lineTo(ww + 20, -18);
    ctx.stroke();
    ctx.fillStyle = "#f1eadc";
    ctx.font = `900 ${Math.max(24, ww * 0.18)}px Consolas, monospace`;
    ctx.textAlign = "center";
    ctx.fillText(".mp4", ww / 2, hh * 0.62);
    ctx.restore();
  }

  function drawBrowser(w, h, p) {
    const x = w * 0.18;
    const y = h * 0.18;
    const bw = w * 0.64;
    const bh = h * 0.56;
    ctx.save();
    ctx.strokeStyle = "rgba(241,234,220,0.72)";
    ctx.fillStyle = "rgba(8,10,13,0.82)";
    ctx.lineWidth = 3;
    ctx.beginPath();
    ctx.roundRect(x, y, bw, bh, 10);
    ctx.fill();
    ctx.stroke();
    ctx.fillStyle = "rgba(241,234,220,0.12)";
    ctx.fillRect(x, y, bw, 44);
    for (let i = 0; i < 3; i++) {
      ctx.fillStyle = i === 0 ? "#ef3426" : "rgba(241,234,220,0.38)";
      ctx.beginPath();
      ctx.arc(x + 26 + i * 24, y + 22, 7, 0, Math.PI * 2);
      ctx.fill();
    }
    ctx.strokeStyle = "rgba(239,52,38,0.78)";
    ctx.lineWidth = 4;
    ctx.strokeRect(x + 32, y + 82, bw * 0.48, bh * 0.42);
    ctx.strokeStyle = "rgba(247,200,90,0.8)";
    ctx.beginPath();
    ctx.moveTo(x + 32, y + bh - 72);
    ctx.lineTo(x + bw - 32, y + bh - 72);
    ctx.stroke();
    for (let i = 0; i < 5; i++) {
      const nx = x + 82 + i * (bw - 164) / 4;
      ctx.fillStyle = i <= Math.floor(p * 5) ? "#ef3426" : "#25282d";
      ctx.beginPath();
      ctx.arc(nx, y + bh - 72, 9, 0, Math.PI * 2);
      ctx.fill();
    }
    ctx.fillStyle = "rgba(241,234,220,0.2)";
    for (let i = 0; i < 6; i++) {
      ctx.fillRect(x + bw * 0.6, y + 88 + i * 42, bw * (0.26 + (i % 2) * 0.08), 16);
    }
    ctx.restore();
  }

  function drawTimeline(w, h, t, p) {
    const y = h * 0.54;
    const x0 = w * 0.14;
    const x1 = w * 0.86;
    ctx.save();
    ctx.strokeStyle = "rgba(241,234,220,0.24)";
    ctx.lineWidth = 3;
    ctx.beginPath();
    ctx.moveTo(x0, y);
    ctx.lineTo(x1, y);
    ctx.stroke();
    ctx.strokeStyle = "#ef3426";
    ctx.lineWidth = 8;
    ctx.beginPath();
    ctx.moveTo(x0, y);
    ctx.lineTo(x0 + (x1 - x0) * p, y);
    ctx.stroke();
    for (let i = 0; i < 8; i++) {
      const x = x0 + (x1 - x0) * i / 7;
      const on = p >= i / 7;
      ctx.fillStyle = on ? "#ef3426" : "#090a0c";
      ctx.strokeStyle = on ? "#ef3426" : "rgba(241,234,220,0.42)";
      ctx.lineWidth = 3;
      ctx.beginPath();
      ctx.arc(x, y, on ? 17 : 12, 0, Math.PI * 2);
      ctx.fill();
      ctx.stroke();
    }
    ctx.restore();
  }

  function drawCards(w, h, p) {
    ctx.save();
    const count = 7;
    const cw = w * 0.16;
    const ch = h * 0.22;
    for (let i = 0; i < count; i++) {
      const phase = Math.max(0, Math.min(1, p * 1.4 - i * 0.08));
      const x = w * 0.12 + i * (w * 0.11);
      const y = h * (0.34 + (i % 2) * 0.12) + (1 - phase) * 120;
      ctx.globalAlpha = 0.2 + phase * 0.8;
      ctx.fillStyle = i % 2 ? "rgba(239,52,38,0.2)" : "rgba(241,234,220,0.08)";
      ctx.strokeStyle = i % 2 ? "#ef3426" : "rgba(241,234,220,0.45)";
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.roundRect(x, y, cw, ch, 8);
      ctx.fill();
      ctx.stroke();
      ctx.fillStyle = "#f1eadc";
      ctx.font = `900 ${Math.max(14, w * 0.015)}px Consolas, monospace`;
      ctx.fillText(`SHOT ${String(i + 1).padStart(2, "0")}`, x + 18, y + 32);
      ctx.fillStyle = "rgba(241,234,220,0.22)";
      ctx.fillRect(x + 18, y + 58, cw - 36, 9);
      ctx.fillRect(x + 18, y + 78, cw * 0.58, 9);
    }
    ctx.restore();
  }

  function drawWave(w, h, t, p) {
    ctx.save();
    const base = h * 0.58;
    ctx.strokeStyle = "#f7c85a";
    ctx.lineWidth = 4;
    ctx.beginPath();
    for (let x = w * 0.1; x <= w * 0.9; x += 5) {
      const n = (x / w) * 22;
      const amp = h * (0.05 + 0.08 * Math.sin(t * 2 + x * 0.01) ** 2);
      const y = base + Math.sin(n + t * 8) * amp * (0.4 + p);
      if (x === w * 0.1) ctx.moveTo(x, y);
      else ctx.lineTo(x, y);
    }
    ctx.stroke();
    ctx.strokeStyle = "#ef3426";
    ctx.lineWidth = 6;
    const x = w * (0.1 + 0.8 * p);
    ctx.beginPath();
    ctx.moveTo(x, h * 0.22);
    ctx.lineTo(x, h * 0.82);
    ctx.stroke();
    ctx.restore();
  }

  function drawScrub(w, h, p) {
    ctx.save();
    const x0 = w * 0.18;
    const x1 = w * 0.82;
    const y = h * 0.66;
    const hx = x0 + (x1 - x0) * (0.12 + 0.76 * p);
    ctx.strokeStyle = "rgba(241,234,220,0.22)";
    ctx.lineWidth = 14;
    ctx.beginPath();
    ctx.moveTo(x0, y);
    ctx.lineTo(x1, y);
    ctx.stroke();
    ctx.strokeStyle = "#ef3426";
    ctx.beginPath();
    ctx.moveTo(x0, y);
    ctx.lineTo(hx, y);
    ctx.stroke();
    ctx.fillStyle = "#f1eadc";
    ctx.beginPath();
    ctx.arc(hx, y, 22, 0, Math.PI * 2);
    ctx.fill();
    for (let i = 0; i < 5; i++) {
      const x = w * 0.23 + i * w * 0.12;
      const yy = h * 0.24 + (i % 2) * h * 0.1;
      ctx.globalAlpha = 0.16 + 0.42 * Math.max(0, Math.sin(p * Math.PI * 5 - i));
      ctx.fillStyle = i % 2 ? "#ef3426" : "#f1eadc";
      ctx.fillRect(x, yy, w * 0.09, h * 0.09);
    }
    ctx.restore();
  }

  function drawScene(w, h, t, index, p) {
    if (index === 0) drawFile(w, h, p);
    if (index === 2) drawBrowser(w, h, p);
    if (index === 4 || index === 6) drawTimeline(w, h, t, p);
    if (index === 7) drawCards(w, h, p);
    if (index === 10 || index === 11) drawWave(w, h, t, p);
    if (index === 12) drawScrub(w, h, p);
    if (index === 13) {
      drawCards(w * 0.62, h, p);
      drawBrowser(w, h, p);
    }
    if (index === 14) {
      drawBrowser(w, h, p);
      drawWave(w, h, t, p);
    }
    if (index === 15) {
      drawTimeline(w, h, t, p);
      drawWave(w, h, t, p);
    }
  }

  function render(t) {
    const index = cueAt(t);
    const p = localProgress(t, index);
    renderCue(index);

    const rect = fit();
    const w = rect.width;
    const h = rect.height;
    drawBackground(w, h, t, index, p);
    drawScene(w, h, t, index, p);

    clock.textContent = fmt(t);
    timecode.textContent = `${fmt(t)} / 01:00`;
    const progress = (t / DURATION) * 100;
    cueFill.style.width = `${progress}%`;
    cueHandle.style.left = `${progress}%`;
    cueTrack.setAttribute("aria-valuenow", t.toFixed(2));

    const card = content.querySelector(".shot-card");
    if (card) {
      const out = p > 0.84 ? (1 - p) / 0.16 : 1;
      card.style.opacity = Math.max(0, Math.min(1, out));
      card.style.transform = `translateY(${Math.sin(p * Math.PI) * -8}px) scale(${1 + Math.sin(p * Math.PI) * 0.012})`;
    }
  }

  function frame() {
    const t = currentTime();
    render(t);
    if (playing && t >= DURATION) {
      pause();
      setTime(DURATION);
    }
    requestAnimationFrame(frame);
  }

  startBtn.addEventListener("click", play);
  playBtn.addEventListener("click", () => playing ? pause() : play());
  restartBtn.addEventListener("click", restart);

  function scrubFromClientX(clientX) {
    const rect = cueTrack.getBoundingClientRect();
    const ratio = Math.max(0, Math.min(1, (clientX - rect.left) / Math.max(1, rect.width)));
    setTime(ratio * DURATION);
    showControls();
  }

  cueTrack.addEventListener("pointerdown", e => {
    e.preventDefault();
    cueTrack.setPointerCapture(e.pointerId);
    scrubFromClientX(e.clientX);
  });

  cueTrack.addEventListener("pointermove", e => {
    if (cueTrack.hasPointerCapture(e.pointerId)) scrubFromClientX(e.clientX);
  });

  cueTrack.addEventListener("pointerup", e => {
    if (cueTrack.hasPointerCapture(e.pointerId)) cueTrack.releasePointerCapture(e.pointerId);
    showControls();
  });

  cueTrack.addEventListener("keydown", e => {
    if (e.code === "ArrowLeft" || e.code === "ArrowDown") {
      e.preventDefault();
      setTime(currentTime() - 1);
    }
    if (e.code === "ArrowRight" || e.code === "ArrowUp") {
      e.preventDefault();
      setTime(currentTime() + 1);
    }
  });

  window.addEventListener("pointermove", e => {
    pointerX = e.clientX / Math.max(1, window.innerWidth);
    pointerY = e.clientY / Math.max(1, window.innerHeight);
    showControls();
  });

  window.addEventListener("keydown", e => {
    if (e.code === "Space") {
      e.preventDefault();
      playing ? pause() : play();
    }
    if (e.code === "ArrowLeft") setTime(currentTime() - 1);
    if (e.code === "ArrowRight") setTime(currentTime() + 1);
  });

  window.addEventListener("resize", () => render(currentTime()));

  render(0);
  requestAnimationFrame(frame);
})();
</script>
</body>
</html>
